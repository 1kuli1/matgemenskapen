<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Matgemenskapen</title>
<style>
body {margin:0;font-family:Arial;background:#0b0f1a;color:white;text-align:center;}
.header {background:#111821;padding:25px;font-size:28px;color:#eab308;font-weight:bold;}
.container {max-width:900px;margin:auto;padding:20px;}
.card {background:#111827;padding:25px;border-radius:15px;margin-bottom:20px;}
h2 {color:#eab308;}
button {width:100%;padding:15px;margin-top:10px;border:none;border-radius:10px;background:#eab308;font-weight:bold;cursor:pointer;}
input, textarea {width:100%;padding:10px;margin-top:8px;border-radius:8px;border:none;}
</style>
</head>
<body>
<div class="header">🌱 Matgemenskapen</div>
<div class="container">
<div class="card">
<h2>Vad är Matgemenskapen?</h2>
<p>Ett nätverk där lokala producenter och konsumenter möts direkt.</p>
</div>
<div class="card">
<h2>För producenter</h2>
<p>Få en enkel beställningssida utan webbshop.</p>
<button onclick="location.href='demo-bestallning.html'">Se demo</button>
</div>
<div class="card">
<h2>För kunder</h2>
<p>Beställ direkt från lokala producenter.</p>
<button onclick="location.href='demo-bestallning.html'">Beställ</button>
</div>
<div class="card">
<h2>Gå med i nätverket</h2>
<input placeholder="Namn">
<input placeholder="Telefon / Mail">
<textarea placeholder="Vad producerar du?"></textarea>
<button>Skicka intresse</button>
</div>
</div>
</body>
</html>
