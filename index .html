<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Matgemenskapen</title>
<style>
body{
margin:0;
font-family:Arial,sans-serif;
background:#0f2f1f;
color:#fffdf5;
}
header{
background:#1f4f35;
padding:40px;
text-align:center;
}
.grid{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:20px;
padding:20px;
}
.card{
background:#1f4f35;
padding:20px;
border-radius:15px;
}
.product{
background:#fffdf5;
color:#153823;
padding:15px;
border-radius:15px;
}
.price{
font-weight:bold;
margin:10px 0;
}
.order-box{
background:#fffdf5;
color:#153823;
margin:20px;
padding:20px;
border-radius:15px;
}
button{
padding:12px 18px;
border:none;
border-radius:10px;
background:#f5e6c8;
cursor:pointer;
font-weight:bold;
}
input,textarea,select{
width:100%;
padding:10px;
margin-top:10px;
}
</style>
</head>
<body>

<header>
<h1>Matgemenskapen</h1>
<p>Lokal mat och gemenskap.</p>
</header>

<section>
<div class="grid" id="productGrid"></div>
</section>

<section>
<div class="order-box">

<h2>Din beställning</h2>

<div id="orderList">
Inga produkter valda ännu.
</div>

<h3 id="total">
Totalt: 0 kr
</h3>

<input id="customerName" type="text" placeholder="Namn">

<input id="customerPhone" type="text" placeholder="Telefon eller e-post">

<select id="pickup">
<option value="Hämtas hos producent">Hämtas hos producent</option>
<option value="Hämtas på utlämningsplats">Hämtas på utlämningsplats</option>
</select>

<input id="wantedDate" type="text" placeholder="Önskad dag/tid">

<textarea id="message" placeholder="Meddelande"></textarea>

<br><br>

<button onclick="createOrderText()">
Skapa beställningstext
</button>

<div id="orderText">
Här visas beställningstexten.
</div>

</div>
</section>

<script>

const products = [

{
name:"Ägg, 12-pack",
producer:"Solbacka Gård",
unit:"förpackning",
price:55
},

{
name:"Potatis, 5 kg",
producer:"Björkbackens Lantbruk",
unit:"påse",
price:85
},

{
name:"Morötter, 1 kg",
producer:"Gröna Boden",
unit:"kg",
price:35
}

];

const productGrid = document.getElementById("productGrid");

products.forEach((product,index)=>{

const div = document.createElement("div");

div.className = "product";

div.innerHTML = `
<h3>${product.name}</h3>
<p>${product.producer}</p>
<p>${product.unit}</p>
<div class="price">${product.price} kr</div>

<input
type="number"
min="0"
value="0"
id="qty-${index}"
oninput="updateOrder()"
>
`;

productGrid.appendChild(div);

});

function updateOrder(){

let list = document.getElementById("orderList");

let total = 0;

let html = "";

products.forEach((product,index)=>{

let qty = Number(
document.getElementById(`qty-${index}`).value
) || 0;

if(qty > 0){

let rowTotal = qty * product.price;

total += rowTotal;

html += `
<div>
${qty} x ${product.name} = ${rowTotal} kr
</div>
`;

}

});

list.innerHTML = html || "Inga produkter valda ännu.";

document.getElementById("total").textContent =
`Totalt: ${total} kr`;

}

function createOrderText(){

let name =
document.getElementById("customerName").value || "Ej angivet";

let contact =
document.getElementById("customerPhone").value || "Ej angivet";

let pickup =
document.getElementById("pickup").value;

let date =
document.getElementById("wantedDate").value || "Ej angivet";

let message =
document.getElementById("message").value || "Inget meddelande";

let lines = [];

let total = 0;

products.forEach((product,index)=>{

let qty = Number(
document.getElementById(`qty-${index}`).value
) || 0;

if(qty > 0){

let rowTotal = qty * product.price;

total += rowTotal;

lines.push(
`${qty} x ${product.name} från ${product.producer} = ${rowTotal} kr`
);

}

});

let order = `BESTÄLLNING - MATGEMENSKAPEN

Namn: ${name}
Kontakt: ${contact}
Utlämning: ${pickup}
Önskad dag/tid: ${date}

Produkter:
${lines.length ? lines.join("\n") : "Inga produkter valda"}

Totalt: ${total} kr

Meddelande:
${message}`;

document.getElementById("orderText").textContent = order;

}

updateOrder();

</script>

</body>
</html>
